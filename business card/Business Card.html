<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Card</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      rel="stylesheet"
    />
    <link href="./main.css" rel="stylesheet" />
  </head>
  <body>
    <div class="card">
      <div class="card-body">
        <h3>WEB DEVELOPER &</h3>
        <h5>Graphic Designer</h5>
      </div>
    </div>

    <div class="card second-card">
      <div class="card-header">
        <h3>ALISHA ASMAT</h3>
        <div>
          <h6>Web Developer & Graphic Designer</h6>
        </div>
      </div>
      <div class="second-card-body">
        <h4>Skills</h4>
        <ul>
          <li>HTML</li>
          <li>CSS</li>
          <li>JAVASCRIPT</li>
          <li>MERN stack</li>
        </ul>
      </div>
      <div class="contact-info">
        <pre><i class="fas fa-phone-alt"></i>  +9203134567891         </pre>
        <pre><i class="fas fa-envelope"></i> email@example.com    </pre>
        <pre><i class="fas fa-map-marker-alt"></i>  Street # 3, city name     </pre>
      </div>
    </div>
  </body>
</html>
